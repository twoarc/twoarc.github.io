<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lige katıl – WorldCup</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      background: #1a1a1a;
      border-radius: 20px;
      padding: 32px;
      max-width: 360px;
      width: 100%;
    }
    h1 { font-size: 1.5rem; margin: 0 0 8px; }
    .code { color: #00ff87; font-weight: 900; letter-spacing: 2px; font-size: 1.2rem; }
    .btn {
      display: block;
      width: 100%;
      padding: 16px 24px;
      margin: 12px 0;
      border-radius: 12px;
      font-weight: 800;
      font-size: 1rem;
      text-decoration: none;
      text-align: center;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.85; }
    .btn-primary {
      background: #00ff87;
      color: #000;
    }
    .btn-secondary {
      background: #2a2a2a;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .divider { margin: 24px 0; color: #8e8e93; font-size: 0.85rem; }
    .store-row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 12px; align-items: center; }
    .store-row a { display: block; }
    .store-row img, .store-row svg { height: 44px; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🏆 Lige katıl</h1>
    <p id="codeLine">Davet kodu: <span id="code" class="code">—</span></p>
    <a id="openApp" href="#" class="btn btn-primary">Lige katıl</a>
    <p class="divider">Uygulama yüklü değilse:</p>
    <div class="store-row">
      <a href="https://play.google.com/store/apps/details?id=com.twoarc.worldcup" target="_blank" rel="noopener" title="Google Play'den indir">
        <img src="https://play.google.com/intl/en_us/badges/static/images/badges/tr_badge_web_generic.png" alt="Google Play" />
      </a>
      <a href="https://apps.apple.com/app/id0000000000" target="_blank" rel="noopener" title="App Store'dan indir" class="appstore-badge">
        <svg width="120" height="40" viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg"><rect width="120" height="40" rx="6" fill="#000" stroke="rgba(255,255,255,0.3)" stroke-width="1"/><text x="60" y="25" text-anchor="middle" fill="#fff" font-size="11" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-weight="600">App Store'dan indir</text></svg>
      </a>
    </div>
    <p class="divider"><small>App Store linkini yayınladıktan sonra güncelleyin (id0000000000 → gerçek app id)</small></p>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code') || '';
      code = code.trim().toUpperCase();
      var deepLink = 'worldcup://join/' + encodeURIComponent(code);
      var openEl = document.getElementById('openApp');
      var codeEl = document.getElementById('code');
      if (code) {
        codeEl.textContent = code;
      } else {
        codeEl.textContent = 'Kod yok';
        deepLink = 'worldcup://';
      }
      openEl.href = deepLink;
      openEl.textContent = 'Lige katıl';
      openEl.removeAttribute('target');
      openEl.onclick = null;
    })();
  </script>
</body>
</html>
