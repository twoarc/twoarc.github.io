<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup - Join the League</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      background: #1a1a1a;
      border-radius: 24px;
      padding: 32px;
      max-width: 380px;
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    h1 { font-size: 1.8rem; margin: 0 0 8px; color: #fff; }
    .code-label { color: #8e8e93; font-size: 0.9rem; margin-bottom: 4px; }
    .code { 
      color: #00ff87; 
      font-weight: 900; 
      letter-spacing: 3px; 
      font-size: 1.5rem; 
      display: block;
      margin-bottom: 24px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 18px 24px;
      margin: 12px 0;
      border-radius: 14px;
      font-weight: 800;
      font-size: 1.1rem;
      text-decoration: none;
      text-align: center;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }
    .btn-primary {
      background: #00ff87;
      color: #000;
    }
    .btn-primary:active { transform: scale(0.98); }
    
    .divider { 
      margin: 32px 0 16px; 
      color: #8e8e93; 
      font-size: 0.85rem; 
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .store-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    .store-link {
      transition: opacity 0.2s;
      display: inline-block;
    }
    .store-link:hover { opacity: 0.8; }
    .store-img {
      height: 48px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🏆 World Cup</h1>
    <p class="code-label">Invite Code</p>
    <span id="code" class="code">—</span>
    
    <a id="openApp" href="#" class="btn btn-primary">Join the League</a>
    
    <div class="divider">Get the App</div>
    
    <div class="store-buttons">
      <a href="https://apps.apple.com/app/id0000000000" class="store-link">
        <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/en-us?size=250x83" alt="Download on App Store" class="store-img">
      </a>
      
      <a href="https://play.google.com/store/apps/details?id=com.twoarc.worldcup" class="store-link">
        <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play" class="store-img" style="height: 64px; margin: -8px 0;">
      </a>
    </div>
  </div>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      let code = params.get('code') || '';
      code = code.trim().toUpperCase();
      
      const openEl = document.getElementById('openApp');
      const codeEl = document.getElementById('code');
      
      const deepLink = code ? `worldcup://join/${encodeURIComponent(code)}` : 'worldcup://';
      
      if (code) {
        codeEl.textContent = code;
      } else {
        codeEl.textContent = 'NO CODE';
      }

      openEl.onclick = function(e) {
        e.preventDefault();
        window.location.href = deepLink;
        
        // Fallback: If app doesn't open, alert user or stay on page
        setTimeout(() => {
          console.log("Deep link triggered");
        }, 500);
      };
    })();
  </script>
</body>
</html>
