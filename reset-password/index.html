<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #050505;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: #151515;
            padding: 24px 20px;
            border-radius: 16px;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }

        h1 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        p {
            font-size: 13px;
            color: #9a9a9a;
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
            color: #e8ff00;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #101010;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 12px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: #e8ff00;
            color: #000;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            margin-top: 4px;
        }

        button:disabled {
            opacity: 0.6;
            cursor: default;
        }

        .msg {
            margin-top: 12px;
            font-size: 12px;
        }

        .msg.error {
            color: #ff4b4b;
        }

        .msg.success {
            color: #19c37d;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Set new password</h1>
        <p id="info">Please enter a new password for your account.</p>

        <form id="reset-form">
            <label for="password">NEW PASSWORD</label>
            <input id="password" type="password" minlength="6" required placeholder="At least 6 characters" />
            <label for="password2">CONFIRM PASSWORD</label>
            <input id="password2" type="password" minlength="6" required placeholder="Repeat password" />
            <button type="submit" id="submit-btn">Change Password</button>
            <div id="message" class="msg"></div>
        </form>
    </div>

    <!-- Supabase JS (browser build) -->
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        // 1) Buraya kendi Supabase URL ve anon key'ini koy
        const SUPABASE_URL = 'https://qknvfnnrfwtnvljuwikw.supabase.co'; // seninki
        const SUPABASE_ANON_KEY = 'sb_publishable_vj0Tv25AZwx65s8eFPZ5lQ_5gc6ZhBu';

        const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { persistSession: false },
        });

        const infoEl = document.getElementById('info');
        const formEl = document.getElementById('reset-form');
        const msgEl = document.getElementById('message');
        const submitBtn = document.getElementById('submit-btn');

        function setMessage(text, type) {
            msgEl.textContent = text || '';
            msgEl.className = 'msg ' + (type || '');
        }

        // 2) URL fragment / query'den access_token & refresh_token oku
        function getParams() {
            const params = {};
            const hash = window.location.hash ? window.location.hash.substring(1) : '';
            const query = window.location.search ? window.location.search.substring(1) : '';
            const all = (hash + '&' + query).split('&').filter(Boolean);
            all.forEach(pair => {
                const [k, v] = pair.split('=');
                if (!k) return;
                params[decodeURIComponent(k)] = decodeURIComponent(v || '');
            });
            return params;
        }

        async function bootstrap() {
            const params = getParams();
            const access_token = params['access_token'];
            const refresh_token = params['refresh_token'];

            if (!access_token || !refresh_token) {
                setMessage('Invalid or expired reset link. Please request a new email from the app.', 'error');
                submitBtn.disabled = true;
                formEl.querySelectorAll('input').forEach(i => (i.disabled = true));
                return;
            }

            // 3) Bu token'larla Supabase oturumu kur
            const { error: sessionError } = await client.auth.setSession({
                access_token,
                refresh_token,
            });
            if (sessionError) {
                console.error(sessionError);
                setMessage('Session error. Please request a new reset link.', 'error');
                submitBtn.disabled = true;
                formEl.querySelectorAll('input').forEach(i => (i.disabled = true));
                return;
            }

            infoEl.textContent = 'Now choose a new password for your account.';
        }

        bootstrap();

        formEl.addEventListener('submit', async (e) => {
            e.preventDefault();
            setMessage('', '');
            const pass1 = document.getElementById('password').value;
            const pass2 = document.getElementById('password2').value;

            if (pass1.length < 6) {
                setMessage('Password must be at least 6 characters.', 'error');
                return;
            }
            if (pass1 !== pass2) {
                setMessage('Passwords do not match.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';

            const { error } = await client.auth.updateUser({ password: pass1 });

            if (error) {
                console.error(error);
                setMessage(error.message || 'Could not update password.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Change Password';
                return;
            }

            setMessage('Password updated successfully. You can now go back to the app and sign in.', 'success');
            submitBtn.textContent = 'Done';
        });
    </script>
</body>

</html>
